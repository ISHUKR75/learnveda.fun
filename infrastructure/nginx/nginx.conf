# nginx.conf — LearnVeda production reverse proxy configuration
# Handles:
#   - HTTPS termination with Let's Encrypt SSL
#   - HTTP to HTTPS redirect
#   - Upstream proxy to Next.js app (port 3000)
#   - WebSocket proxy for Socket.IO (port 3001)
#   - Compression and caching headers
#   - Security headers

user  nginx;
worker_processes  auto;    # Match number of CPU cores
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;  # Max simultaneous connections per worker
    use epoll;                 # Efficient I/O on Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10M;  # Max upload size

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting zone — 10MB shared memory, 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ── Upstream Servers ──────────────────────────────────────────────
    upstream nextjs_upstream {
        server web:3000;  # Next.js app
        keepalive 32;     # Persistent connections to upstream
    }

    upstream socketio_upstream {
        server socket-server:3001;  # Socket.IO server
        ip_hash;                    # Sticky sessions for WebSocket
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────
    server {
        listen 80;
        server_name learnveda.in www.learnveda.in;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name learnveda.in www.learnveda.in;

        # SSL configuration — managed by Certbot
        ssl_certificate     /etc/letsencrypt/live/learnveda.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/learnveda.in/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;   # Disable older protocols
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Socket.IO WebSocket Proxy ──────────────────────────────
        location /socket.io/ {
            proxy_pass http://socketio_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;   # Long timeout for WebSocket
            proxy_send_timeout 86400s;
        }

        # ── API Rate Limiting ──────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;  # Allow bursts of 20
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Next.js Static Files Caching ──────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs_upstream;
            proxy_cache_valid 200 365d;     # Cache static assets for 1 year
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── General Next.js App ────────────────────────────────────
        location / {
            limit_req zone=general burst=60 nodelay;
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache HTML pages for 10 minutes
            proxy_cache_valid 200 10m;
        }

        # ── Health check endpoint ──────────────────────────────────
        location /health {
            proxy_pass http://nextjs_upstream/api/health;
            access_log off;  # Don't log health checks
        }
    }
}
