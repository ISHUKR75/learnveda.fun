# ============================================================
# LearnVeda — Docker Compose (Development)
# ============================================================
# Starts all required services for local development:
# MongoDB, Redis, Meilisearch
# ============================================================

version: '3.9'

services:
  # -- MongoDB Database --
  mongodb:
    image: mongo:7
    container_name: learnveda-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: learnveda
    volumes:
      - mongodb_data:/data/db
    networks:
      - learnveda-network

  # -- Redis Cache --
  redis:
    image: redis:7-alpine
    container_name: learnveda-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - learnveda-network

  # -- Meilisearch (Full-text Search) --
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: learnveda-meilisearch
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: masterKey123
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - learnveda-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  learnveda-network:
    driver: bridge
