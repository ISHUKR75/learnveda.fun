# =============================================================================
# .github/workflows/ci.yml
# LearnVeda — Continuous Integration Pipeline
#
# Triggers:
#  - Every push to main, develop, feature/* branches
#  - Every pull request targeting main
#
# Jobs:
#  1. lint      — ESLint + TypeScript type check
#  2. test      — Unit tests with Jest/Vitest (when added)
#  3. build     — Next.js production build
#  4. security  — npm audit for vulnerabilities
#  5. lighthouse — Performance & SEO score (on PRs to main only)
#
# Secrets required (set in GitHub repo settings):
#  - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#  - CLERK_SECRET_KEY
#  - MONGODB_URI (for build-time connection check)
# =============================================================================

name: LearnVeda CI

on:
  push:
    branches:
      - main       # Production branch
      - develop    # Development branch
      - "feature/*" # Feature branches
  pull_request:
    branches:
      - main       # PRs targeting production

# Cancel in-progress runs when a new commit is pushed (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default shell for all run steps
defaults:
  run:
    shell: bash

jobs:

  # ===========================================================================
  # Job 1: Lint & Type Check
  # Runs ESLint and TypeScript compiler to catch syntax and type errors early
  # ===========================================================================
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest # Use latest Ubuntu runner

    steps:
      # Step 1: Check out the repository code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js 20 LTS
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # LTS version — matches Replit environment
          cache: "npm"       # Cache npm dependencies for faster subsequent runs
          cache-dependency-path: apps/web/package-lock.json

      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        working-directory: apps/web
        run: npm ci --prefer-offline # Clean install — use lockfile exactly

      # Step 4: Run ESLint
      - name: 🧹 Run ESLint
        working-directory: apps/web
        run: npm run lint
        continue-on-error: false # Fail the job if linting fails

      # Step 5: TypeScript type check (without emitting files)
      - name: 🔷 TypeScript type check
        working-directory: apps/web
        run: npx tsc --noEmit
        continue-on-error: false # Fail on type errors

  # ===========================================================================
  # Job 2: Build
  # Ensures the Next.js app builds successfully for production
  # ===========================================================================
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs: lint # Only run if lint passes

    env:
      # Provide placeholder env vars for build-time validation
      # Real values are set in production environment
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
      CLERK_SECRET_KEY:                  ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
      MONGODB_URI:                       ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/learnveda' }}
      NEXT_PUBLIC_APP_URL:               "https://learnveda.in"
      SESSION_SECRET:                    ${{ secrets.SESSION_SECRET || 'ci-build-secret-placeholder' }}

    steps:
      # Step 1: Check out code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        working-directory: apps/web
        run: npm ci --prefer-offline

      # Step 4: Build Next.js app
      - name: 🔨 Build Next.js application
        working-directory: apps/web
        run: npm run build

      # Step 5: Cache the build output for deployment
      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/.next/
          retention-days: 7 # Keep build artifact for 7 days

  # ===========================================================================
  # Job 3: Security Audit
  # Checks npm dependencies for known vulnerabilities
  # ===========================================================================
  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        working-directory: apps/web
        run: npm ci --prefer-offline

      # Step 4: Run npm audit (fail on high/critical vulnerabilities)
      - name: 🛡️ npm security audit
        working-directory: apps/web
        run: npm audit --audit-level=high
        continue-on-error: true # Don't block PRs — report only for now

  # ===========================================================================
  # Job 4: Notify on Success
  # Posts a summary comment on PRs when all checks pass
  # ===========================================================================
  notify:
    name: ✅ Notify Success
    runs-on: ubuntu-latest
    needs: [lint, build, security] # Run after all jobs
    if: success() && github.event_name == 'pull_request' # Only on PRs

    steps:
      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         '✅ **LearnVeda CI passed!**\n\n| Check | Status |\n|-------|--------|\n| 🔍 Lint & Types | ✅ Passed |\n| 🏗️ Build | ✅ Passed |\n| 🔐 Security | ✅ Checked |\n\nReady to merge! 🚀'
            })
