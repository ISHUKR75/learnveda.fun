# =============================================================================
# docker/redis.conf
# LearnVeda — Redis configuration for development and production
#
# Key settings tuned for LearnVeda's use cases:
#  - Rate limiting (short TTL, many small keys)
#  - Session cache (medium TTL, ~1KB per entry)
#  - Leaderboard cache (frequent reads, 2-min TTL)
#  - API response cache (15-30 min TTL)
#
# @see https://redis.io/docs/management/config/
# =============================================================================

# =============================================================================
# NETWORK
# =============================================================================

# Listen on all interfaces (Docker handles network isolation)
bind 0.0.0.0                      # Accept connections from all IPs

# Default Redis port
port 6379                          # Standard Redis port

# TCP backlog for high-concurrency environments
tcp-backlog 511                    # Queue length for new connections

# Close idle connections after 60 seconds
timeout 60                         # Close connections idle for 60s

# TCP keepalive — send keepalive packets every 300 seconds
tcp-keepalive 300                  # Seconds between keepalive probes

# =============================================================================
# GENERAL
# =============================================================================

# Run as a daemon (false in Docker — Docker manages the process)
daemonize no                       # Keep in foreground for Docker

# Log level: debug, verbose, notice, warning
loglevel notice                    # Production: notice | Dev: verbose

# Log to stdout (Docker captures stdout)
logfile ""                         # Empty string = log to stdout

# Number of databases (0 is default, separate logical namespaces)
databases 16                       # 16 logical databases

# Always show the startup logo
always-show-logo no                # Skip startup banner in production

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Maximum memory limit (adjust based on your server RAM)
maxmemory 256mb                    # Limit Redis to 256MB RAM

# Eviction policy when maxmemory is reached
# allkeys-lru: Evict least recently used keys from all keys
# This is ideal for caching — old/stale cache entries get evicted first
maxmemory-policy allkeys-lru       # Evict LRU keys when memory is full

# Number of keys to check when deciding which to evict
maxmemory-samples 10               # Check 10 keys when evicting (more = more accurate)

# =============================================================================
# PERSISTENCE (AOF — Append Only File)
# =============================================================================

# Enable AOF persistence for durability
# This ensures data survives Redis restarts (important for sessions)
appendonly yes                     # Enable AOF persistence

# AOF filename
appendfilename "appendonly.aof"    # File for AOF data

# fsync policy:
#  always    — safest, slowest (sync on every write)
#  everysec  — balanced (sync once per second, may lose 1s of data)
#  no        — fastest, least safe (let OS decide when to sync)
appendfsync everysec               # Sync to disk every second

# Don't block writes during AOF rewrite
no-appendfsync-on-rewrite no       # Don't block writes during rewrite

# Trigger AOF rewrite when file grows 100% larger than last rewrite
auto-aof-rewrite-percentage 100    # Rewrite trigger: 100% growth
auto-aof-rewrite-min-size 64mb    # Minimum AOF size before rewriting

# =============================================================================
# RDB SNAPSHOTS (Secondary persistence)
# =============================================================================

# Save snapshots at these intervals: save <seconds> <changes>
save 300 10                        # Save if 10 changes in 300 seconds
save 60 1000                       # Save if 1000 changes in 60 seconds

# RDB filename
dbfilename dump.rdb                # Filename for RDB snapshots

# Directory for RDB and AOF files
dir /data                          # Persistent data directory (Docker volume)

# =============================================================================
# SECURITY
# =============================================================================

# Require password authentication (set via environment in Docker)
# requirepass your-redis-password-here
# Disabled in development — enable in production via environment variable

# Rename or disable dangerous commands in production
# Uncomment in production:
# rename-command FLUSHDB ""        # Prevent flushing all data
# rename-command FLUSHALL ""       # Prevent flushing all databases
# rename-command CONFIG ""         # Prevent runtime config changes
# rename-command DEBUG ""          # Prevent debug commands

# =============================================================================
# SLOW LOG
# =============================================================================

# Log commands slower than 10ms (10000 microseconds)
slowlog-log-slower-than 10000      # Threshold in microseconds

# Keep the last 128 slow log entries
slowlog-max-len 128                # Maximum slow log entries to keep

# =============================================================================
# LATENCY MONITORING
# =============================================================================

# Enable latency monitoring (useful for debugging performance issues)
latency-monitor-threshold 100      # Track operations slower than 100ms

# =============================================================================
# ADVANCED CONFIG
# =============================================================================

# Use more memory-efficient encoding for small hashes
hash-max-listpack-entries 128      # Max entries before switching to hash table
hash-max-listpack-value 64         # Max value size for listpack encoding

# Use efficient encoding for small sorted sets (leaderboard)
zset-max-listpack-entries 128      # Max entries for listpack sorted set
zset-max-listpack-value 64         # Max value size

# Lazy freeing — free memory asynchronously to avoid blocking
lazyfree-lazy-eviction yes         # Free evicted keys lazily
lazyfree-lazy-expire yes           # Free expired keys lazily
lazyfree-lazy-server-del yes       # Free server-deleted keys lazily
